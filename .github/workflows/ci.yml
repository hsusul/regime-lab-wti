name: CI

on:
  push:
  pull_request:

jobs:
  smoke-no-tf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -E -v '^(tensorflow(|-probability)|tf-keras)' requirements.txt > /tmp/requirements-smoke.txt
          python -m pip install -r /tmp/requirements-smoke.txt

      - name: Run smoke checks
        run: make smoke

  tf-train-optional:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: smoke-no-tf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install full dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run optional TF training path
        run: |
          python - <<'PY'
          try:
              import tensorflow  # noqa: F401
              import tensorflow_probability  # noqa: F401
          except Exception:
              print("TensorFlow/TFP unavailable in this environment; skipping optional training.")
              raise SystemExit(0)
          print("TensorFlow available; running optional train + plots checks.")
          PY
          python -m scripts.train_local --config configs/default.yaml --force-refresh
          python -m scripts.make_plots

  docker-build:
    runs-on: ubuntu-latest
    needs: smoke-no-tf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t regime-lab-wti:ci .
