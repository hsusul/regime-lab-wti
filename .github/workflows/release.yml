name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: regime-lab-wti-source-${{ github.ref_name }}
          path: |
            app
            configs
            energy_data
            models
            scripts
            tests
            README.md
            Makefile
            requirements.txt
